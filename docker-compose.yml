# ============================================================
# Media Stack - Docker Compose
# Vereist: .env bestand op basis van .env.example
# Toegang via Tailscale Serve op de Synology host
#
# Volume strategie:
# - /volume1/docker    → SABnzbd, Jellyfin, Jellyseerr config
# - /volume2/Databases → ARR app databases (Sonarr, Radarr etc.)
# - /volume1/Media     → alle media bestanden
# ============================================================

services:

  # ------------------------------------------------------------
  # SABnzbd - Usenet download client
  # ------------------------------------------------------------
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/sabnzbd/config:/config
      - ${MEDIA_PATH}/Download/complete:/downloads/complete
      - ${MEDIA_PATH}/Download/incomplete:/downloads/incomplete
      - ${MEDIA_PATH}:/media
    ports:
      - ${PORT_SABNZBD}:8080
    networks:
      - mediastack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api?mode=version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Prowlarr - Indexer manager
  # ------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/prowlarr:/config
    ports:
      - ${PORT_PROWLARR}:9696
    networks:
      - mediastack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Sonarr - Series beheer
  # ------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${PORT_SONARR}:8989
    networks:
      - mediastack
    restart: unless-stopped
    depends_on:
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Radarr - Film beheer
  # ------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/radarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${PORT_RADARR}:7878
    networks:
      - mediastack
    restart: unless-stopped
    depends_on:
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Lidarr - Muziek beheer
  # ------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/lidarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${PORT_LIDARR}:8686
    networks:
      - mediastack
    restart: unless-stopped
    depends_on:
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Bazarr - Ondertitels
  # ------------------------------------------------------------
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/bazarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - ${PORT_BAZARR}:6767
    networks:
      - mediastack
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Jellyfin - Media server
  # ------------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/jellyfin/config:/config
      - ${DB_PATH}/jellyfin:/data/cache
      - ${MEDIA_PATH}/TV:/data/tvshows
      - ${MEDIA_PATH}/Movie:/data/movies
      - ${MEDIA_PATH}/Music:/data/music
      - ${MEDIA_PATH}/Books:/data/books
    ports:
      - ${PORT_JELLYFIN}:8096
    networks:
      - mediastack
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Jellyseerr - Request portal
  # ------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - LOG_LEVEL=debug
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/jellyseerr/config:/app/config
      - ${DB_PATH}/jellyseerr:/app/config/db
    ports:
      - ${PORT_JELLYSEERR}:5055
    networks:
      - mediastack
    restart: unless-stopped
    depends_on:
      - jellyfin
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Recyclarr - TRaSH Guide kwaliteitsprofielen sync
  # ------------------------------------------------------------
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/recyclarr/config:/config
      - ./config/recyclarr/recyclarr.yml:/config/recyclarr.yml:ro
      - ./config/recyclarr/secrets.yml:/config/secrets.yml:ro
    networks:
      - mediastack
    restart: on-failure
    depends_on:
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Watchtower - Automatische image updates
  # ------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL}
      - WATCHTOWER_NOTIFICATION_REPORT=true
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped


  # ------------------------------------------------------------
  # Spotweb - Usenet nieuwslezer
  # ------------------------------------------------------------
  spotweb:
    image: erikdevries/spotweb:latest
    container_name: spotweb_sqlite
    user: "${PUID}:${PGID}" # Make sure to set the correct UID and GID for your system
    environment:
      - TZ=${TZ}
      - DB_ENGINE=pdo_sqlite
      - DB_NAME=/var/www/spotweb/dbfiles/spotweb.db3
      - CRON_INTERVAL=*/1 * * * *
    volumes:
      - ${DB_PATH}/spotweb_sqlite:/var/www/spotweb/dbfiles
    ports:
      - ${PORT_SPOTWEB}:80
    networks:
      - mediastack
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Spotweb - Usenet nieuwslezer
  # ------------------------------------------------------------
  spottarr:
    image: ghcr.io/spottarr/spottarr:latest
    container_name: spottarr
    user: "${PUID}:${PGID}" # Make sure to set the correct UID and GID for your system
    environment:
      - USENET__HOSTNAME=${USENET__HOSTNAME}
      - USENET__USERNAME=${USENET__USERNAME}
      - USENET__PASSWORD=${USENET__PASSWORD}
      - USENET__PORT=${USENET__PORT}
      - USENET__USETLS=${USENET__USETLS}
      - USENET__MAXCONNECTIONS=${USENET__MAXCONNECTIONS} # Adjust based on your usenet provider and other download clients
      - SPOTNET__RETRIEVEAFTER=2009-10-01T00:00:00Z
      - SPOTNET__IMPORTBATCHSIZE=10000 # Adjust based on available memory
      - SPOTNET__RETENTIONDAYS=0 # Use 0 for unlimited
      - SPOTNET__IMPORTADULTCONTENT=false
      - TZ=${TZ} # Set your timezone, e.g. Europe/Amsterdam
    volumes:
      - ${DB_PATH}/spottarr:/data
      - ${DB_PATH}/spottarr:/config
    ports:
      - "${PORT_SPOTTARR}:8383"
    networks:
      - mediastack
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 800M # Adjust based on available memory

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - ${DOCKER_PATH}/homepage:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations, see alternative methods
    environment:
      HOMEPAGE_ALLOWED_HOSTS: gethomepage.dev,192.168.1.250:3000,microserver:3000 # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      PUID: $PUID
      PGID: $PGID
    networks:
      - mediastack
    restart: unless-stopped

networks:
  mediastack:
    name: mediastack
    driver: bridge
