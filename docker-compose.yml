# ============================================================
# Media Stack - Docker Compose
# Vereist: .env bestand op basis van .env.example
# Elke service heeft een Tailscale sidecar voor VPN-vrije toegang
# ============================================================

services:

  # ============================================================
  # SABNZBD
  # ============================================================
  tailscale-sabnzbd:
    image: tailscale/tailscale:latest
    container_name: tailscale-sabnzbd
    hostname: sabnzbd
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-sabnzbd:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: service:tailscale-sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/sabnzbd/config:/config
      - ${MEDIA_PATH}/Download/complete:/downloads/complete
      - ${MEDIA_PATH}/Download/incomplete:/downloads/incomplete
    restart: unless-stopped
    depends_on:
      - tailscale-sabnzbd
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # PROWLARR
  # ============================================================
  tailscale-prowlarr:
    image: tailscale/tailscale:latest
    container_name: tailscale-prowlarr
    hostname: prowlarr
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-prowlarr:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:tailscale-prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/prowlarr/config:/config
    restart: unless-stopped
    depends_on:
      - tailscale-prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # SONARR
  # ============================================================
  tailscale-sonarr:
    image: tailscale/tailscale:latest
    container_name: tailscale-sonarr
    hostname: sonarr
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-sonarr:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:tailscale-sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/sonarr/config:/config
      - ${MEDIA_PATH}:/media
    restart: unless-stopped
    depends_on:
      - tailscale-sonarr
      - sabnzbd
      - prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # RADARR
  # ============================================================
  tailscale-radarr:
    image: tailscale/tailscale:latest
    container_name: tailscale-radarr
    hostname: radarr
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-radarr:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:tailscale-radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/radarr/config:/config
      - ${MEDIA_PATH}:/media
    restart: unless-stopped
    depends_on:
      - tailscale-radarr
      - sabnzbd
      - prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # LIDARR
  # ============================================================
  tailscale-lidarr:
    image: tailscale/tailscale:latest
    container_name: tailscale-lidarr
    hostname: lidarr
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-lidarr:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: service:tailscale-lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/lidarr/config:/config
      - ${MEDIA_PATH}:/media
    restart: unless-stopped
    depends_on:
      - tailscale-lidarr
      - sabnzbd
      - prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # BAZARR
  # ============================================================
  tailscale-bazarr:
    image: tailscale/tailscale:latest
    container_name: tailscale-bazarr
    hostname: bazarr
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-bazarr:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: service:tailscale-bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/bazarr/config:/config
      - ${MEDIA_PATH}:/media
    restart: unless-stopped
    depends_on:
      - tailscale-bazarr
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # JELLYFIN
  # ============================================================
  tailscale-jellyfin:
    image: tailscale/tailscale:latest
    container_name: tailscale-jellyfin
    hostname: jellyfin
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-jellyfin:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    network_mode: service:tailscale-jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/jellyfin/config:/config
      - ${DB_PATH}/jellyfin:/data/cache
      - ${MEDIA_PATH}/TV:/data/tvshows
      - ${MEDIA_PATH}/Movie:/data/movies
      - ${MEDIA_PATH}/Music:/data/music
      - ${MEDIA_PATH}/Books:/data/books
    restart: unless-stopped
    depends_on:
      - tailscale-jellyfin
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # JELLYSEERR
  # ============================================================
  tailscale-jellyseerr:
    image: tailscale/tailscale:latest
    container_name: tailscale-jellyseerr
    hostname: jellyseerr
    environment:
      - TS_AUTHKEY=client:${TS_OAUTH_CLIENT_ID}?ephemeral=true&preauth=true&tags=tag:container&clientsecret=${TS_OAUTH_CLIENT_SECRET}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${DOCKER_PATH}/tailscale-jellyseerr:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    network_mode: service:tailscale-jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/jellyseerr/config:/app/config
    restart: unless-stopped
    depends_on:
      - tailscale-jellyseerr
      - jellyfin
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # RECYCLARR
  # ============================================================
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/recyclarr/config:/config
      - ./config/recyclarr/recyclarr.yml:/config/recyclarr.yml:ro
      - ./config/recyclarr/secrets.yml:/config/secrets.yml:ro
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ============================================================
  # WATCHTOWER
  # ============================================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL}
      - WATCHTOWER_NOTIFICATION_REPORT=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
