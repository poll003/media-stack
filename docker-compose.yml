# ============================================================
# Media Stack - Docker Compose
# Vereist: .env bestand op basis van .env.example
# Toegang via Tailscale Serve op de Synology host
#
# Volume strategie:
# - /volume1/docker    → SABnzbd, Jellyfin, Jellyseerr config
# - /volume2/Databases → ARR app databases (Sonarr, Radarr etc.)
# - /volume1/Media     → alle media bestanden
# ============================================================

services:

  # ------------------------------------------------------------
  # SABnzbd - Usenet download client
  # ------------------------------------------------------------
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/sabnzbd/config:/config
      - ${MEDIA_PATH}/Download/complete:/downloads/complete
      - ${MEDIA_PATH}/Download/incomplete:/downloads/incomplete
    ports:
      - 127.0.0.1:${PORT_SABNZBD}:8080
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Prowlarr - Indexer manager
  # ------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/prowlarr:/config
    ports:
      - 127.0.0.1:${PORT_PROWLARR}:9696
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Sonarr - Series beheer
  # ------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 127.0.0.1:${PORT_SONARR}:8989
    restart: unless-stopped
    depends_on:
      - sabnzbd
      - prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Radarr - Film beheer
  # ------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/radarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 127.0.0.1:${PORT_RADARR}:7878
    restart: unless-stopped
    depends_on:
      - sabnzbd
      - prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Lidarr - Muziek beheer
  # ------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/lidarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 127.0.0.1:${PORT_LIDARR}:8686
    restart: unless-stopped
    depends_on:
      - sabnzbd
      - prowlarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Bazarr - Ondertitels
  # ------------------------------------------------------------
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DB_PATH}/bazarr:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 127.0.0.1:${PORT_BAZARR}:6767
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Jellyfin - Media server
  # ------------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/jellyfin/config:/config
      - ${DB_PATH}/jellyfin:/data/cache
      - ${MEDIA_PATH}/TV:/data/tvshows
      - ${MEDIA_PATH}/Movie:/data/movies
      - ${MEDIA_PATH}/Music:/data/music
      - ${MEDIA_PATH}/Books:/data/books
    ports:
      - 127.0.0.1:${PORT_JELLYFIN}:8096
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Jellyseerr - Request portal
  # ------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/jellyseerr/config:/app/config
      - ${DB_PATH}/jellyseerr:/app/config/db
    ports:
      - 127.0.0.1:${PORT_JELLYSEERR}:5055
    restart: unless-stopped
    depends_on:
      - jellyfin
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Recyclarr - TRaSH Guide kwaliteitsprofielen sync
  # ------------------------------------------------------------
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_PATH}/recyclarr/config:/config
      - ./config/recyclarr/recyclarr.yml:/config/recyclarr.yml:ro
      - ./config/recyclarr/secrets.yml:/config/secrets.yml:ro
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ------------------------------------------------------------
  # Watchtower - Automatische image updates
  # ------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL}
      - WATCHTOWER_NOTIFICATION_REPORT=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
