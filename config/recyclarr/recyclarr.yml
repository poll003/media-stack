# ============================================================
# Recyclarr - TRaSH Guides configuratie
# Automatische sync van kwaliteitsprofielen naar Sonarr & Radarr
#
# Pas de API keys aan na de eerste keer opstarten van Sonarr/Radarr:
# Sonarr:  Instellingen → Algemeen → API Key
# Radarr:  Instellingen → Algemeen → API Key
# ============================================================

###############################################################
# SONARR
###############################################################
sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !secret sonarr_api_key

    quality_definition:
      type: series

    quality_profiles:
      # ----------------------------------------------------------
      # Profiel 1: 4K HDR10/HDR10+ (hoogste kwaliteit)
      # ----------------------------------------------------------
      - name: "4K HDR"
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: HDTV-2160p

        custom_formats:
          # HDR formaten - voorkeur volgorde voor Samsung QN92BA
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca  # HDR10+
              - 3e2c4e748b64a1a1118e0ea3f4cf6875  # HDR10
              - 17e889ce13117940092308f48b48b45b  # HLG
            assign_scores_to:
              - name: "4K HDR"
                score: 500

          # Dolby Vision zonder fallback vermijden op Samsung
          - trash_ids:
              - 1f733af03141f068a540eec352589a89  # DV (WEBDL)
            assign_scores_to:
              - name: "4K HDR"
                score: -10000

          # Gewenste release groepen
          - trash_ids:
              - e6258996055b9fbab7e9cb2f75819294  # WEB Tier 01
              - 58790d4e2fdcd9733aa7ae68ba2bb503  # WEB Tier 02
            assign_scores_to:
              - name: "4K HDR"
                score: 200

          # Ongewenste releases
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK (onverwerkte disc image)
              - 9c14d194486c4014d422adc64ce53be1  # Dubs Only
            assign_scores_to:
              - name: "4K HDR"
                score: -10000

      # ----------------------------------------------------------
      # Profiel 2: 1080p (fallback / zuiniger op opslag)
      # ----------------------------------------------------------
      - name: "1080p"
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p

        custom_formats:
          # Gewenste release groepen
          - trash_ids:
              - e6258996055b9fbab7e9cb2f75819294  # WEB Tier 01
              - 58790d4e2fdcd9733aa7ae68ba2bb503  # WEB Tier 02
            assign_scores_to:
              - name: "1080p"
                score: 200

          # Ongewenste releases
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
              - 9c14d194486c4014d422adc64ce53be1  # Dubs Only
              - 47435ece6b99a0b477caf360e79ba0bb  # x265 (720/1080p) - bij 1080p vermijden
            assign_scores_to:
              - name: "1080p"
                score: -10000

###############################################################
# RADARR
###############################################################
radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !secret radarr_api_key

    quality_definition:
      type: movie

    quality_profiles:
      # ----------------------------------------------------------
      # Profiel 1: 4K HDR10/HDR10+
      # ----------------------------------------------------------
      - name: "4K HDR"
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p

        custom_formats:
          # HDR voorkeur voor Samsung QN92BA
          - trash_ids:
              - b974a6cd08c1066250f1f177d7aa1225  # HDR10+
              - dfb86d5941bc9075d6af23b09c2aeecd  # HDR10
              - e61e28db95d22bedcadf030b8f156d96  # HDR
              - 2a4d9069cc1fe3242ff9bdaebed239bb  # HDR (undefined)
            assign_scores_to:
              - name: "4K HDR"
                score: 500

          # HDR10+ Boost - extra score voor beste Samsung kwaliteit
          - trash_ids:
              - b974a6cd08c1066250f1f177d7aa1225  # HDR10+
            assign_scores_to:
              - name: "4K HDR"
                score: 200

          # Dolby Vision vermijden (niet ondersteund op Samsung)
          - trash_ids:
              - 585c1c8d3a9de0b2e76fcc85a811b59c  # DV HDR10+ (acceptabel als fallback aanwezig)
            assign_scores_to:
              - name: "4K HDR"
                score: 0

          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca  # DV (geen fallback)
            assign_scores_to:
              - name: "4K HDR"
                score: -10000

          # Audio formaten
          - trash_ids:
              - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
              - 2f22d89048b01681dde8afe203bf2e95  # DTS X
              - 417804f7f2c4308c1f4c5d380d4c4475  # ATMOS (undefined)
              - 1af239278386be2919e1bcee0bde047e  # DD+ ATMOS
              - 3cafb66171b47f226146a0770576870f  # TrueHD
              - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
              - a570d4a0e56a2874b64e5bfa55202a1b  # FLAC
              - e7c2fcae07cbada050a0af3357491d7b  # PCM
            assign_scores_to:
              - name: "4K HDR"
                score: 100

          # Gewenste release groepen
          - trash_ids:
              - ed27ebfef2f323e964fb1f61391bcb35  # Remux Tier 01
              - c20c8647f2746a1f4c4262b0fbbeeeae  # Remux Tier 02
              - 4d74ac4c4db0b64bff6ce0cffef99bf0  # UHD Bluray Tier 01
              - a58f517a70193f8e578056642178419d  # UHD Bluray Tier 02
            assign_scores_to:
              - name: "4K HDR"
                score: 200

          # Ongewenste releases
          - trash_ids:
              - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
              - 9c38ebb7384dada637be8899efa68e6f  # BR-DISK
              - ed38b889b31be83fda192888e2286d83  # Upscaled
            assign_scores_to:
              - name: "4K HDR"
                score: -10000

      # ----------------------------------------------------------
      # Profiel 2: 1080p
      # ----------------------------------------------------------
      - name: "1080p"
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p Remux
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p

        custom_formats:
          # Audio
          - trash_ids:
              - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
              - 2f22d89048b01681dde8afe203bf2e95  # DTS X
              - 3cafb66171b47f226146a0770576870f  # TrueHD
              - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
            assign_scores_to:
              - name: "1080p"
                score: 100

          # Gewenste release groepen
          - trash_ids:
              - c20c8647f2746a1f4c4262b0fbbeeeae  # Bluray Tier 01
              - e6258996055b9fbab7e9cb2f75819294  # WEB Tier 01
              - 58790d4e2fdcd9733aa7ae68ba2bb503  # WEB Tier 02
            assign_scores_to:
              - name: "1080p"
                score: 200

          # Ongewenste releases
          - trash_ids:
              - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
              - 9c38ebb7384dada637be8899efa68e6f  # BR-DISK
              - ed38b889b31be83fda192888e2286d83  # Upscaled
              - 47435ece6b99a0b477caf360e79ba0bb  # x265 (720/1080p)
            assign_scores_to:
              - name: "1080p"
                score: -10000
